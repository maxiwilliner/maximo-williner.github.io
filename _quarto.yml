project:
  type: website
  output-dir: docs
  resources:
    - reveal.js
    - favicon.svg
    - .nojekyll
  preview:
    port: 4200

website:
  title: "Maximo Williner"
  description: "Software Developer & Data Analyst trained at 42 Madrid — pipelines, dashboards, and tools that ship. Progress in Motion."
  favicon: favicon.svg
  page-navigation: false
  search: false
  navbar:
    pinned: true
    left:
      - text: "Home"
        href: "#home"
      - text: "About"
        href: "#about"
      - text: "Work"
        href: "#work"
      - text: "Experience"
        href: "#experience"
      - text: "Contact"
        href: "#contact"
    right:
      - icon: github
        href: https://github.com/maxiwilliner
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/maximo-williner-12155a292/
        aria-label: LinkedIn
format:
  html:
    theme: darkly
    css: custom.css
    toc: false
    anchor-sections: false
    mainfont: "Inter"
    monofont: "JetBrains Mono"
    page-layout: full
    html-math-method: webtex
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js" defer></script>
        <meta property="og:title" content="Maximo Williner - Software Developer & Data Analyst">
        <meta property="og:description" content="Software Developer & Data Analyst trained at 42 Madrid — pipelines, dashboards, and tools that ship. Progress in Motion.">
        <meta property="og:type" content="website">
        <meta property="og:image" content="https://maximo-williner.github.io/favicon.svg">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Maximo Williner - Software Developer & Data Analyst">
        <meta name="twitter:description" content="Software Developer & Data Analyst trained at 42 Madrid — pipelines, dashboards, and tools that ship. Progress in Motion.">
        <meta name="twitter:image" content="https://maximo-williner.github.io/favicon.svg">
        <script>document.documentElement.classList.add('js-enabled')</script>
        <script src="reveal.js" defer></script>
    include-before-body:
      text: |
        <div id="scroll-progress" aria-hidden="true"></div>
        <div id="cursor-glow" aria-hidden="true"></div>
        <button id="back-to-top" type="button" aria-label="Back to top" title="Back to top">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
        </button>