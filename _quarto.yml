project:
  type: website
  output-dir: docs
  resources:
    - reveal.js
    - favicon.svg
  preview:
    port: 4200

website:
  title: "Maximo Williner - Data Analyst"
  description: "Portfolio of data analytics, BI, and ETL work. Progress in Motion."
  favicon: favicon.svg
  page-navigation: false
  search: false
  navbar:
    pinned: true
    left:
      - text: "Home"
        href: "#home"
      - text: "About"
        href: "#about"
      - text: "Work"
        href: "#work"
      - text: "Experience"
        href: "#experience"
      - text: "Contact"
        href: "#contact"
    right:
      - icon: github
        href: https://github.com/maxiwilliner
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/maximo-williner-12155a292/
        aria-label: LinkedIn
  page-footer:
    center: "Built with Quarto - (c) 2026 Maximo Williner"

format:
  html:
    theme: darkly
    css: custom.css
    toc: false
    mainfont: "Inter"
    monofont: "JetBrains Mono"
    page-layout: full
    html-math-method: webtex
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js" defer></script>
        <meta property="og:title" content="Maximo Williner - Data Analyst">
        <meta property="og:description" content="Portfolio of data analytics, BI, and ETL work. Progress in Motion.">
        <meta property="og:type" content="website">
        <meta property="og:image" content="favicon.svg">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Maximo Williner - Data Analyst">
        <meta name="twitter:description" content="Portfolio of data analytics, BI, and ETL work. Progress in Motion.">
        <meta name="twitter:image" content="favicon.svg">
        <script>document.documentElement.classList.add('js-enabled')</script>
        <script src="reveal.js" defer></script>
    include-before-body:
      text: |
        <div id="scroll-progress" aria-hidden="true"></div>